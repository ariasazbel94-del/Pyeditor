<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyFactory v3.1 — Fast Load</title>

<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Mono:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
:root { --bg: #07080d; --s1: #0d0e16; --s2: #12131e; --accent: #5f6fff; --green: #2effa8; --red: #ff4d6d; --text: #d8d9f0; --muted: #5a5b7a; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Loader mejorado */
#loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
.spinner { width: 40px; height: 40px; border: 4px solid var(--s1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
#btn-forzar { display: none; margin-top: 20px; padding: 10px 20px; background: var(--s2); border: 1px solid var(--muted); color: white; border-radius: 8px; cursor: pointer; }

header { background: var(--s1); height: 48px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #2a2b42; justify-content: space-between; }
.logo { font-family: 'Space Mono'; font-size: 0.9rem; font-weight: 700; color: var(--accent); }

main { flex: 1; display: grid; grid-template-columns: 1fr 320px; overflow: hidden; }
.editor-container { position: relative; display: flex; background: var(--bg); }
.gutter { width: 40px; background: var(--s1); color: var(--muted); text-align: right; padding: 16px 5px; font-family: monospace; font-size: 12px; line-height: 1.65; border-right: 1px solid #2a2b42; overflow: hidden; }
#codigo, #highlighting { position: absolute; inset: 0 0 0 40px; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.65; border: none; outline: none; white-space: pre; tab-size: 4; }
#codigo { background: transparent; color: transparent; caret-color: white; z-index: 2; resize: none; overflow: auto; }
#highlighting { z-index: 1; pointer-events: none; overflow: hidden; }

.sidebar { display: flex; flex-direction: column; background: var(--s1); border-left: 1px solid #2a2b42; }
.diag-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.card { background: var(--s2); padding: 12px; border-radius: 8px; border-left: 3px solid var(--muted); font-size: 0.75rem; }
.card.err { border-left-color: var(--red); }
.card.ok { border-left-color: var(--green); }
.console { height: 140px; background: #000; padding: 10px; color: var(--green); font-family: monospace; font-size: 0.75rem; overflow-y: auto; border-top: 1px solid #2a2b42; }
.actions { padding: 12px; display: flex; gap: 8px; background: var(--s2); }
.btn { flex: 1; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
.btn-run { background: var(--accent); color: white; }
</style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div style="font-family: 'Space Mono'; font-size: 0.8rem;">INICIALIZANDO PYFACTORY...</div>
    <button id="btn-forzar" onclick="quitarLoader()">FORZAR ENTRADA</button>
</div>

<header>
    <div class="logo">🐍 PyFACTORY <small style="color:var(--muted); font-weight:400">v3.1</small></div>
    <div id="status" style="font-size:0.6rem; color:var(--muted)">CONECTANDO...</div>
</header>

<main>
    <div class="editor-container">
        <div id="gutter" class="gutter">1</div>
        <textarea id="codigo" spellcheck="false" oninput="updateEditor()" onscroll="syncScroll()"># Código de prueba
print("¡Motor listo!")</textarea>
        <pre id="highlighting"><code class="language-python" id="code-render"></code></pre>
    </div>

    <div class="sidebar">
        <div class="diag-body" id="diags">
            <div class="card">Esperando ejecución...</div>
        </div>
        <div class="console" id="consola">>>></div>
        <div class="actions">
            <button class="btn btn-run" id="btn-run">EJECUTAR</button>
        </div>
    </div>
</main>

<script>
function updateEditor() {
    const code = document.getElementById('codigo').value;
    document.getElementById('code-render').textContent = code;
    Prism.highlightElement(document.getElementById('code-render'));
    const lines = code.split('\n').length;
    document.getElementById('gutter').innerText = Array.from({length: lines}, (_, i) => i + 1).join('\n');
}
function syncScroll() {
    const ta = document.getElementById('codigo');
    document.getElementById('highlighting').scrollTop = ta.scrollTop;
    document.getElementById('gutter').scrollTop = ta.scrollTop;
}
function quitarLoader() {
    document.getElementById('loader').style.opacity = '0';
    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
}
// Si en 6 segundos no ha cargado, mostrar botón de emergencia
setTimeout(() => {
    if(document.getElementById('loader').style.display !== 'none') {
        document.getElementById('btn-forzar').style.display = 'block';
    }
}, 6000);
updateEditor();
</script>

<script type="py">
from pyscript import window, document, when
import sys, io

@when("click", "#btn-run")
def run_code(event):
    code = document.getElementById("codigo").value
    consola = document.getElementById("consola")
    buf = io.StringIO()
    sys.stdout = buf
    try:
        exec(code, {})
        consola.innerText = buf.getvalue() or "✓"
    except Exception as e:
        consola.innerText = str(e)
    finally:
        sys.stdout = sys.__stdout__

# Al terminar de cargar este bloque, quitamos el loader
window.quitarLoader()
document.getElementById("status").innerText = "ONLINE"
document.getElementById("status").style.color = "#2effa8"
</script>

</body>
</html>
