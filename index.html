<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyFactory v7.0 — Absolute Resolution</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #030305; --surface: #0a0a0e; --border: #16161d; --accent: #00f2ff; --green: #2effa8; --error: #ff3e5e; --warn: #ffb84d; --logic: #bb86fc; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: #f0f0f0; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
        main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .editor-zone { flex: 1.2; position: relative; background: #000; }
        #codigo, #highlighting { margin: 0; padding: 20px; width: 100%; height: 100%; font-family: 'JetBrains Mono', monospace; font-size: 13px; position: absolute; inset: 0; box-sizing: border-box; border: none; outline: none; tab-size: 4; }
        #codigo { color: transparent; background: transparent; caret-color: #fff; z-index: 2; resize: none; white-space: pre; overflow: auto; }
        #highlighting { z-index: 1; pointer-events: none; white-space: pre; overflow: hidden; }
        .control-panel { flex: 0.9; background: var(--surface); border-top: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; font-family: 'Syne'; font-size: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn-sec { background: #111118; color: var(--accent); border: 1px solid var(--accent); }
        .btn-pri { background: var(--green); color: #000; }
        .btn-fix { background: var(--warn); color: #000; display: none; grid-column: span 2; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 184, 77, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 184, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 184, 77, 0); } }
        #diag-log { background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.4; min-height: 80px; }
        .msg-err { color: var(--error); border-left: 3px solid var(--error); padding-left: 8px; margin-bottom: 5px; }
        .msg-logic { color: var(--logic); border-left: 3px solid var(--logic); padding-left: 8px; margin-bottom: 5px; }
        .msg-ok { color: var(--green); font-weight: bold; }
        #consola { background: #000; padding: 10px; color: #888; font-family: 'JetBrains Mono'; font-size: 11px; border-top: 1px solid #111; white-space: pre-wrap; height: 60px; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:800; letter-spacing: -1px;">PYFACTORY <span style="color:var(--accent)">RESOLUTION</span></div>
    <div id="status" style="font-size: 9px; color: var(--green);">[ CONSISTENCY ENGINE: ON ]</div>
</header>

<main>
    <div class="editor-zone">
        <textarea id="codigo" spellcheck="false" oninput="renderCode();" onscroll="syncScroll();"># Código que causaba bucle
def proceso(n)
  if n > limite_fantasma:
    eval("print('Riesgo')")
    print(resultado)</textarea>
        <pre id="highlighting" aria-hidden="true"><code class="language-python" id="hi-content"></code></pre>
    </div>

    <div class="control-panel">
        <div class="btn-grid">
            <button class="btn btn-sec" id="btn-analizar">🔍 ANALIZAR FINAL</button>
            <button class="btn btn-pri" id="btn-ejecutar">▶ EJECUTAR</button>
            <button class="btn btn-fix" id="btn-corregir">🔧 RESOLVER Y FINALIZAR</button>
        </div>
        <div id="diag-log">Analiza para resolver inconsistencias.</div>
        <div id="consola">>>> Ready</div>
    </div>
</main>

<script type="py">
from pyscript import window, document, when
import sys, io, traceback, ast

_final_fix = ""

def build_symbol_table(tree):
    # Obtiene todos los nombres definidos, incluyendo built-ins
    symbols = set(dir(__builtins__))
    for node in ast.walk(tree):
        if isinstance(node, (ast.FunctionDef, ast.ClassDef)):
            symbols.add(node.name)
            if hasattr(node, 'args'):
                for a in node.args.args: symbols.add(a.arg)
        elif isinstance(node, ast.Assign):
            for t in node.targets:
                if isinstance(t, ast.Name): symbols.add(t.id)
    return symbols

@when("click", "#btn-analizar")
def analyze(event):
    global _final_fix
    code = document.getElementById("codigo").value
    log = document.getElementById("diag-log")
    btn_fix = document.getElementById("btn-corregir")
    btn_fix.style.display = "none"
    
    current_lines = code.split('\n')
    issues = []
    
    # 1. Chequeo de Sintaxis Crítica
    try:
        tree = ast.parse(code)
    except SyntaxError as e:
        log.innerHTML = f"<div class='msg-err'>❌ SINTAXIS DETECTADA: {e.msg} (Línea {e.lineno})</div>"
        if "expected ':'" in e.msg:
            current_lines[e.lineno-1] = current_lines[e.lineno-1].rstrip() + ":"
        elif "indent" in e.msg:
            current_lines[e.lineno-1] = "    " + current_lines[e.lineno-1].lstrip()
        _final_fix = "\n".join(current_lines)
        btn_fix.style.display = "block"
        return

    # 2. Análisis de Lógica con Supresión de Auto-Falsos
    symbols = build_symbol_table(tree)
    missing = []
    
    for node in ast.walk(tree):
        if isinstance(node, ast.Name) and isinstance(node.ctx, ast.Load):
            # Solo reportar si no está definido Y no es una de nuestras auto-variables
            if node.id not in symbols and "# Auto-inicializado" not in code:
                issues.append(f"<div class='msg-logic'>💡 LOGICA: '{node.id}' no tiene origen.</div>")
                missing.append(node.id)

    # 3. Seguridad Silenciosa
    security_risk = "eval(" in code or "exec(" in code
    if security_risk and "[SAFE]" not in code:
        issues.append("<div class='msg-err'>🚫 SEGURIDAD: Código dinámico sin filtrar.</div>")

    # PREPARAR REPARACIÓN FINAL
    temp_lines = current_lines[:]
    if missing:
        for m in set(missing):
            if f"{m} =" not in code:
                temp_lines.insert(0, f"{m} = None  # Auto-inicializado")
    
    if security_risk:
        temp_lines = [("# [SAFE] " + l if ("eval(" in l or "exec(" in l) and "# [SAFE]" not in l else l) for l in temp_lines]

    _final_fix = "\n".join(temp_lines)
    
    # Solo mostrar botón si el código nuevo es realmente diferente al actual
    if issues and _final_fix.strip() != code.strip():
        log.innerHTML = "".join(issues)
        btn_fix.style.display = "block"
    else:
        log.innerHTML = "<span class='msg-ok'>✅ ESTADO DE EQUILIBRIO: Código corregido y validado.</span>"

@when("click", "#btn-corregir")
def apply_fix(event):
    global _final_fix
    if _final_fix:
        document.getElementById("codigo").value = _final_fix
        window.renderCode()
        document.getElementById("diag-log").innerHTML = "<span class='msg-ok'>✨ RESOLUCIÓN COMPLETADA. EL BUCLE SE HA ROTO.</span>"
        document.getElementById("btn-corregir").style.display = "none"

@when("click", "#btn-ejecutar")
def run_code(event):
    code = document.getElementById("codigo").value
    consola = document.getElementById("consola")
    buf = io.StringIO()
    sys.stdout = buf
    try:
        exec(code, {})
        consola.innerText = buf.getvalue() or "✓ Programa ejecutado con éxito."
        consola.style.color = "var(--green)"
    except Exception:
        consola.innerText = traceback.format_exc()
        consola.style.color = "var(--error)"
    finally:
        sys.stdout = sys.__stdout__
</script>

<script>
    function renderCode() {
        const c = document.getElementById('codigo').value;
        document.getElementById('hi-content').textContent = c;
        Prism.highlightElement(document.getElementById('hi-content'));
    }
    function syncScroll() {
        const e = document.getElementById('codigo');
        const h = document.getElementById('highlighting');
        h.scrollTop = e.scrollTop;
    }
    window.onload = renderCode;
</script>
</body>
</html>
