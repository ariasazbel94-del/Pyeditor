<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyFactory Intelligence — Fix Packager</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #08080a; --surface: #121217; --border: #2a2a35; --accent: #7c6aff; --green: #3dffa0; --text: #e8e8f0; --error: #ff5e7a; --fix: #ffb86c; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface); height: 50px; }
        main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .editor-section { flex: 1.2; position: relative; background: var(--surface); }
        #codigo, #highlighting { margin: 0; padding: 20px; border: 0; width: 100%; height: 100%; font-family: 'JetBrains Mono', monospace; font-size: 14px; position: absolute; top: 0; left: 0; box-sizing: border-box; tab-size: 4; }
        #codigo { color: transparent; background: transparent; caret-color: white; z-index: 1; resize: none; outline: none; white-space: pre; overflow: auto; }
        #highlighting { z-index: 0; pointer-events: none; white-space: pre; overflow: hidden; }
        .output-section { flex: 0.8; background: #000; padding: 15px; overflow-y: auto; border-top: 1px solid var(--border); }
        #diagnostico-container { background: #1a1a24; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--accent); display: flex; flex-direction: column; gap: 10px; }
        #diag-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; white-space: pre-wrap; }
        #btn-corregir-ui { display: none; background: var(--fix); color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 10px; align-self: flex-start; }
        #consola { color: var(--green); font-family: 'JetBrains Mono', monospace; font-size: 11px; white-space: pre-wrap; margin-top: 10px; }
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 8px; z-index: 100; }
        button.action-btn { padding: 12px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-family: 'Syne'; font-size: 0.7rem; }
        .btn-run { background: var(--accent); color: white; }
        .btn-export { background: #ffffff; color: #000; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:800;">🐍 Py<span>Factory</span></div>
    <div id="status" style="font-size:0.6rem; color:var(--green);">MOTOR LISTO</div>
</header>

<main>
    <div class="editor-section">
        <textarea id="codigo" spellcheck="false" oninput="updateView();" onscroll="syncScroll();">from pyodide.http import pyfetch
import asyncio

async def test():
    print("Revisando red...")
    res = await pyfetch('https://pyscript.net')
    print(f"Status: {res.status}")

await test()</textarea>
        <pre id="highlighting" aria-hidden="true"><code class="language-python" id="highlighting-content"></code></pre>
    </div>
    
    <div class="output-section">
        <div id="diagnostico-container">
            <div id="diag-text">Analizador preparado...</div>
            <button id="btn-corregir-ui">🔧 CORREGIR AHORA</button>
        </div>
        <div id="consola">>>> Consola</div>
    </div>
</main>

<div class="controls">
    <button class="action-btn btn-export" onclick="exportarAppSeguro()">🚀 GENERAR HTML</button>
    <button class="action-btn btn-run" id="btn-ejecutar">EJECUTAR</button>
</div>

<script type="py">
from pyscript import window, document, when
import sys, io, traceback, ast

solucion_actual = ""

def generar_fix(error_msg, linea_idx, texto_completo):
    lineas = texto_completo.split('\n')
    if linea_idx >= len(lineas): linea_idx = len(lineas) - 1
    linea_con_problema = lineas[linea_idx]
    
    if "expected ':'" in error_msg:
        lineas[linea_idx] = linea_con_problema.rstrip() + ":"
        return "\n".join(lineas), "Añadido ':' faltante."
    if "indent" in error_msg:
        lineas[linea_idx] = "    " + linea_con_problema.lstrip()
        return "\n".join(lineas), "Ajustada la indentación."
    return None, None

@when("click", "#btn-ejecutar")
def procesar(event):
    global solucion_actual
    codigo = document.getElementById("codigo").value
    consola = document.getElementById("consola")
    diag_text = document.getElementById("diag-text")
    btn_fix = document.getElementById("btn-corregir-ui")
    btn_fix.style.display = "none"
    
    try:
        ast.parse(codigo)
        diag_text.innerHTML = "<span style='color:var(--green)'>✅ Estructura correcta.</span>"
    except SyntaxError as e:
        nuevo_codigo, desc = generar_fix(e.msg, e.lineno - 1, codigo)
        if nuevo_codigo:
            solucion_actual = nuevo_codigo
            diag_text.innerHTML = f"<span style='color:var(--error)'>❌ ERROR: {e.msg}</span>\n<span style='color:var(--fix)'>💡 {desc}</span>"
            btn_fix.style.display = "block"
        else:
            diag_text.innerHTML = f"<span style='color:var(--error)'>❌ ERROR: {e.msg}</span>"
        return

    buffer = io.StringIO()
    sys.stdout = buffer
    try:
        # Usamos eval para soportar await en el nivel superior si es posible
        exec(codigo, {})
        consola.innerText = buffer.getvalue() or "✓ Ejecutado"
    except Exception:
        consola.innerText = traceback.format_exc()
    finally:
        sys.stdout = sys.__stdout__

@when("click", "#btn-corregir-ui")
def aplicar_fix(event):
    global solucion_actual
    if solucion_actual:
        document.getElementById("codigo").value = solucion_actual
        window.updateView()
        document.getElementById("btn-corregir-ui").style.display = "none"
</script>

<script>
    function updateView() {
        const code = document.getElementById('codigo').value;
        document.getElementById('highlighting-content').textContent = code;
        Prism.highlightElement(document.getElementById('highlighting-content'));
    }
    function syncScroll() {
        const ed = document.getElementById('codigo');
        const hi = document.getElementById('highlighting');
        hi.scrollTop = ed.scrollTop;
    }

    function exportarAppSeguro() {
        const pyCode = document.getElementById('codigo').value;
        
        // CORRECCIÓN CRUCIAL: Limpiamos espacios y forzamos indentación correcta para el bloque try
        const lineas = pyCode.split('\n');
        const codigoIdentado = lineas.map(linea => '        ' + linea).join('\n');

        const template = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"><\/script>
    <style>
        body { background: #08080a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #121217; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #2a2a35; border-top: 5px solid #7c6aff; width: 90%; max-width: 320px; box-sizing: border-box; }
        #out { background: #000; padding: 15px; border-radius: 10px; margin-top: 15px; color: #3dffa0; font-family: monospace; font-size: 0.75rem; min-height: 80px; text-align: left; overflow-x: auto; white-space: pre-wrap; word-break: break-all; border: 1px solid #222; }
        button { background: #7c6aff; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h3 style="margin-top:0">App Ejecutable</h3>
        <div id="out">>>> Cargando motor...</div>
        <button id="b">EJECUTAR CÓDIGO</button>
    </div>
    <script type="py">
from pyscript import when, document
import sys, io

document.querySelector("#out").innerText = ">>> Listo para usar"

@when("click", "#b")
async def main(event):
    out = document.querySelector("#out")
    out.innerText = "Procesando..."
    buf = io.StringIO()
    sys.stdout = buf
    try:
        # Código inyectado con indentación garantizada
${codigoIdentado}
        
        res_print = buf.getvalue()
        out.innerText = res_print if res_print else "✓ Ejecución finalizada"
    except Exception as e:
        out.innerText = f"Error:\\n{str(e)}"
    finally:
        sys.stdout = sys.__stdout__
<\/script>
</body>
</html>`;

        const blob = new Blob([template], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "mi_herramienta.html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
